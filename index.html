const parseM3U = (content) => {
  const lines = content.split('\n');
  const channels = [];
  const groups = new Set();

  let currentChannel = {};

  lines.forEach((line) => {
    const trimmed = line.trim();
    if (!trimmed) return;

    if (trimmed.startsWith('#EXTINF:')) {
      currentChannel = {};
      
      const nameMatch = trimmed.match(/tvg-name="([^"]*)"/i);
      const logoMatch = trimmed.match(/tvg-logo="([^"]*)"/i);
      const groupMatch = trimmed.match(/group-title="([^"]*)"/i);
      const displayNameMatch = trimmed.match(/,(.+)$/);

      currentChannel.name = nameMatch ? nameMatch[1] : (displayNameMatch ? displayNameMatch[1].trim() : 'Unknown Channel');
      currentChannel.logo = logoMatch ? logoMatch[1] : undefined;
      currentChannel.group = groupMatch ? groupMatch[1] : 'Uncategorized';
      
      groups.add(currentChannel.group);
      
    } else if (!trimmed.startsWith('#')) {
      const name = currentChannel.name || trimmed.split('/').pop() || `Channel ${channels.length + 1}`;
      const group = currentChannel.group || 'Uncategorized';
      
      channels.push({
        id: `ch-${channels.length}-${Date.now()}`,
        name: name,
        logo: currentChannel.logo,
        group: group,
        url: trimmed,
        status: 'unknown'
      });
      
      groups.add(group);
      currentChannel = {};
    }
  });

  return {
    channels,
    groups: Array.from(groups).sort()
  };
};

const checkStreamHealth = async (url) => {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 3000);
    const response = await fetch(url, { 
      method: 'HEAD', 
      signal: controller.signal,
      mode: 'no-cors'
    });
    clearTimeout(timeoutId);
    return 'online';
  } catch (error) {
    return 'offline';
  }
};

// ── PeerJS loader (same as MirrorLink) ──
const PFX = 'ml-v3-';
let _peerPromise = null;
function loadPeerJS() {
  if (typeof Peer !== 'undefined') return Promise.resolve();
  if (_peerPromise) return _peerPromise;
  _peerPromise = new Promise((ok, fail) => {
    function load(u, fb) {
      const s = document.createElement('script'); s.src = u;
      s.onload = ok;
      s.onerror = () => fb ? load(fb, null) : fail(new Error('PeerJS unavailable'));
      document.head.appendChild(s);
    }
    load('https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js',
         'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js');
  });
  return _peerPromise;
}
loadPeerJS().catch(() => {});

// ── CastService: streams a MediaStream to a MirrorLink receiver ──
class CastService {
  constructor() { this.p = null; this.call = null; this.dc = null; this.dead = false; this.ls = null; this.mi = null; }
  _setup() {
    return new Promise(res => {
      if (this.p && !this.p.destroyed) { if (this.p.disconnected) this.p.reconnect(); res(); return; }
      const ICE = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
      const p = new Peer(undefined, { debug: 0, config: { iceServers: ICE } });
      p.on('open', () => { this._keepAlive(); res(); });
      p.on('error', e => console.warn('[CS]', e));
      p.on('disconnected', () => { if (!this.dead) p.reconnect(); });
      this.p = p;
    });
  }
  _keepAlive() {
    if (this.mi) clearInterval(this.mi);
    this.mi = setInterval(() => { if (this.p && !this.p.destroyed && this.p.disconnected) try { this.p.reconnect(); } catch (e) {} }, 5000);
  }
  async connectAndStream(code, stream) {
    this.ls = stream;
    const tid = PFX + code;
    await this._setup();
    await new Promise((ok, fail) => {
      const c = this.p.connect(tid, { reliable: true });
      this.dc = c;
      const t = setTimeout(() => fail(new Error('DC timeout')), 15000);
      const hb = setInterval(() => { if (c.open) try { c.send({ type: 'PING' }); } catch (e) {} else clearInterval(hb); }, 2000);
      c.on('open', () => { clearTimeout(t); if (this.call) try { this.call.close(); } catch (e) {} this.call = this.p.call(tid, stream); ok(); });
      c.on('error', e => { clearTimeout(t); clearInterval(hb); fail(e); });
    });
  }
  destroy() {
    this.dead = true;
    if (this.mi) clearInterval(this.mi);
    if (this.call) try { this.call.close(); } catch (e) {}
    if (this.dc) try { this.dc.close(); } catch (e) {}
    if (this.ls) try { this.ls.getTracks().forEach(t => t.stop()); } catch (e) {}
    if (this.p) try { this.p.destroy(); } catch (e) {}
    this.p = null; this.ls = null;
  }
}

const VideoPlayer = ({ url, title, onClose }) => {
  const videoRef = useRef(null);
  const containerRef = useRef(null);
  const canvasRef = useRef(null);
  const animationFrameRef = useRef(null);

  const [isPlaying, setIsPlaying] = useState(false);
  const [isMuted, setIsMuted] = useState(false);
  const [volume, setVolume] = useState(1);
  const [isFullscreen, setIsFullscreen] = useState(false);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [hlsInstance, setHlsInstance] = useState(null);
  const [controlsVisible, setControlsVisible] = useState(true);
  const controlsTimeoutRef = useRef(null);
  const retryCountRef = useRef(0);

  // Recording State
  const [isRecording, setIsRecording] = useState(false);
  const mediaRecorderRef = useRef(null);
  const [showSavePrompt, setShowSavePrompt] = useState(false);
  const [recordingBlob, setRecordingBlob] = useState(null);

  // Cast State
  const [showCastModal, setShowCastModal] = useState(false);
  const [castCode, setCastCode] = useState('');
  const [isCasting, setIsCasting] = useState(false);
  const [castStatus, setCastStatus] = useState('');
  const castServiceRef = useRef(null);

  useEffect(() => {
    let hls = null;
    const video = videoRef.current;
    
    retryCountRef.current = 0;

    if (!video) return;

    setLoading(true);
    setError(null);

    const handleManifestParsed = () => {
      setLoading(false);
      video.play().catch(e => console.error("Auto-play blocked", e));
      setIsPlaying(true);
    };

    const handleError = (_event, data) => {
      if (data.fatal) {
        switch (data.type) {
          case Hls.ErrorTypes.NETWORK_ERROR:
            console.error("Network error encountered", data);
            if (retryCountRef.current < 3) {
              retryCountRef.current++;
              console.log(`Retrying network error... Attempt ${retryCountRef.current}/3`);
              hls?.startLoad();
            } else {
              hls?.destroy();
              setError("Network Error: Stream unavailable, CORS blocked, or Mixed Content.");
              setLoading(false);
            }
            break;
          case Hls.ErrorTypes.MEDIA_ERROR:
            console.error("Media error encountered");
            hls?.recoverMediaError();
            break;
          default:
            hls?.destroy();
            setError("Stream error: " + data.details);
            setLoading(false);
            break;
        }
      }
    };

    if (Hls.isSupported()) {
      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: false,
        backBufferLength: 90,
        maxBufferLength: 60,
        maxMaxBufferLength: 600,
        manifestLoadingTimeOut: 20000,
        manifestLoadingMaxRetry: 5,
        levelLoadingTimeOut: 20000,
        levelLoadingMaxRetry: 5,
        fragLoadingTimeOut: 30000,
        fragLoadingMaxRetry: 5,
        startLevel: -1,
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, handleManifestParsed);
      hls.on(Hls.Events.ERROR, handleError);
      setHlsInstance(hls);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.addEventListener('loadedmetadata', handleManifestParsed);
      video.addEventListener('error', () => {
        setError("Native playback error.");
        setLoading(false);
      });
    } else {
      setError("HLS is not supported in this browser.");
      setLoading(false);
    }

    return () => {
      if (hls) hls.destroy();
      if (video) {
        video.removeEventListener('loadedmetadata', handleManifestParsed);
        video.removeAttribute('src'); 
        video.load();
      }
    };
  }, [url]);

  const togglePlay = () => {
    if (videoRef.current) {
      if (isPlaying) {
        videoRef.current.pause();
      } else {
        videoRef.current.play();
      }
      setIsPlaying(!isPlaying);
    }
  };

  const toggleMute = () => {
    if (videoRef.current) {
      videoRef.current.muted = !isMuted;
      setIsMuted(!isMuted);
    }
  };

  const handleVolumeChange = (e) => {
    const newVolume = parseFloat(e.target.value);
    setVolume(newVolume);
    if (videoRef.current) {
      videoRef.current.volume = newVolume;
      setIsMuted(newVolume === 0);
    }
  };

  const toggleFullscreen = () => {
    if (!containerRef.current) return;
    if (!document.fullscreenElement) {
      containerRef.current.requestFullscreen().catch(err => console.error(err));
      setIsFullscreen(true);
    } else {
      document.exitFullscreen();
      setIsFullscreen(false);
    }
  };

  const handleMouseMove = useCallback(() => {
    setControlsVisible(true);
    if (controlsTimeoutRef.current) clearTimeout(controlsTimeoutRef.current);
    controlsTimeoutRef.current = setTimeout(() => {
      if (isPlaying && !showSavePrompt) setControlsVisible(false);
    }, 2500);
  }, [isPlaying, showSavePrompt]);

  const handleRetry = () => {
    setLoading(true);
    setError(null);
    retryCountRef.current = 0;
    if (hlsInstance) {
      hlsInstance.loadSource(url);
      hlsInstance.startLoad();
    } else if (videoRef.current) {
      videoRef.current.src = url;
      videoRef.current.load();
    }
  };

  // --- Optimized 60FPS Recording Logic ---
  const startRecording = () => {
    const video = videoRef.current;
    if (!video) return;

    try {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 1280;
      canvas.height = video.videoHeight || 720;
      
      const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
      canvasRef.current = canvas;

      const draw = () => {
        if (!video || !ctx || video.paused || video.ended) return;
        try {
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          animationFrameRef.current = requestAnimationFrame(draw);
        } catch (e) {
          console.warn("Frame draw failed");
        }
      };

      let stream = null;

      try {
        ctx?.drawImage(video, 0, 0, canvas.width, canvas.height);
        draw();
        stream = canvas.captureStream(60);
        
        const videoStreamRaw = video.captureStream ? video.captureStream() : video.mozCaptureStream ? video.mozCaptureStream() : null;
        if (videoStreamRaw && videoStreamRaw.getAudioTracks().length > 0) {
           stream.addTrack(videoStreamRaw.getAudioTracks()[0]);
        }
      } catch (err) {
        console.log("Canvas SecurityError, falling back to direct stream.");
        stream = video.captureStream ? video.captureStream(60) : video.mozCaptureStream ? video.mozCaptureStream(60) : null;
      }

      if (!stream) {
        setError("Browser does not support capturing this stream.");
        return;
      }

      const mimeTypes = [
        "video/webm;codecs=h264", 
        "video/mp4;codecs=avc1",
        "video/webm;codecs=vp8",
        "video/webm"
      ];
      
      const selectedMimeType = mimeTypes.find(type => MediaRecorder.isTypeSupported(type)) || "";

      const options = { 
        mimeType: selectedMimeType,
        videoBitsPerSecond: 5000000 
      };

      const recorder = new MediaRecorder(stream, options);
      mediaRecorderRef.current = recorder;
      const chunks = [];

      recorder.ondataavailable = (e) => {
        if (e.data.size > 0) chunks.push(e.data);
      };

      recorder.onstop = () => {
        if (animationFrameRef.current) cancelAnimationFrame(animationFrameRef.current);
        canvasRef.current = null;
        
        const blob = new Blob(chunks, { type: selectedMimeType || 'video/webm' });
        setRecordingBlob(blob);
        setShowSavePrompt(true);
        setIsRecording(false);
      };

      recorder.start(); 
      
      setIsRecording(true);
      setError(null);

    } catch (err) {
      console.error("Recording init error:", err);
      setError("Recording failed: " + err.message);
      setTimeout(() => setError(null), 3000);
    }
  };

  const stopRecording = () => {
    if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
      mediaRecorderRef.current.stop();
    }
  };

  const downloadRecording = () => {
    if (!recordingBlob) return;
    const blobUrl = URL.createObjectURL(recordingBlob);
    const a = document.createElement('a');
    a.style.display = 'none';
    a.href = blobUrl;
    
    const ext = mediaRecorderRef.current?.mimeType.includes('mp4') ? 'mp4' : 'webm';
    a.download = `${title.replace(/[^a-z0-9]/gi, '_')}_60fps.${ext}`;
    
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(blobUrl);
    }, 100);
    
    setShowSavePrompt(false);
    setRecordingBlob(null);
  };

  const discardRecording = () => {
    setRecordingBlob(null);
    setShowSavePrompt(false);
  };

  // ── Cast functions ──
  const startCast = async () => {
    const code = castCode.replace(/\D/g, '');
    if (code.length !== 6) { setCastStatus('Inserisci un codice valido a 6 cifre'); return; }
    const video = videoRef.current;
    if (!video) return;
    setCastStatus('Connessione...');
    try {
      await loadPeerJS();
    } catch (e) { setCastStatus('Impossibile caricare la libreria di rete.'); return; }

    // Capture stream from video element
    let stream = null;
    try {
      stream = video.captureStream ? video.captureStream() : video.mozCaptureStream ? video.mozCaptureStream() : null;
    } catch (e) {}
    if (!stream || stream.getVideoTracks().length === 0) {
      setCastStatus('Impossibile catturare lo stream del canale. Riprova dopo il caricamento.'); return;
    }

    const svc = new CastService();
    castServiceRef.current = svc;
    try {
      await svc.connectAndStream(code, stream);
      setIsCasting(true);
      setCastStatus('In trasmissione su ' + code.slice(0,3) + ' ' + code.slice(3));
    } catch (e) {
      svc.destroy();
      castServiceRef.current = null;
      setCastStatus('Connessione fallita. Verifica il codice e riprova.');
    }
  };

  const stopCast = () => {
    if (castServiceRef.current) { castServiceRef.current.destroy(); castServiceRef.current = null; }
    setIsCasting(false);
    setCastStatus('');
    setCastCode('');
    setShowCastModal(false);
  };

  return (
    React.createElement('div', {
      ref: containerRef,
      className: "relative w-full h-full bg-black group overflow-hidden flex items-center justify-center rounded-2xl shadow-2xl border border-white/10",

      React.createElement('video', {
        ref: videoRef,
        crossOrigin: "anonymous",
        className: "w-full h-full object-contain will-change-transform transform-gpu",
        playsInline: true,
        onPlay: () => setIsPlaying(true),
        onPause: () => setIsPlaying(false)

      // Loading Overlay
      loading && React.createElement('div', {
        className: "absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm z-20"
      },
        React.createElement(Loader2, { className: "w-12 h-12 text-blue-400 animate-spin mb-4" }),
        React.createElement('p', { className: "text-white/80 font-light tracking-wide mb-6" }, "Connecting to stream..."),
        React.createElement('button', {
          onClick: onClose,
          className: "flex items-center gap-2 px-5 py-2 bg-white/10 hover:bg-white/20 border border-white/10 rounded-full text-white/90 text-sm transition-all hover:scale-105"
        },
          React.createElement(X, { className: "w-4 h-4" }), " Cancel"
        )

      // Save Prompt Overlay
      showSavePrompt && React.createElement('div', {
        className: "absolute inset-0 flex items-center justify-center bg-black/80 backdrop-blur-md z-40 p-6"
      },
        React.createElement('div', { className: "bg-[#1a1f35] border border-white/10 p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center" },
          React.createElement('div', { className: "w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-4" },
            React.createElement(Download, { className: "w-8 h-8 text-blue-400" })
          ),
          React.createElement('h3', { className: "text-xl font-bold text-white mb-2" }, "Recording Ready"),
          React.createElement('p', { className: "text-white/50 text-sm mb-6" }, "Captured at high-framerate (60 FPS)."),
          React.createElement('div', { className: "flex gap-3" },
            React.createElement('button', {
              onClick: discardRecording,
              className: "flex-1 py-3 bg-white/5 hover:bg-white/10 border border-white/5 rounded-xl text-white/70 hover:text-red-400 transition-colors flex items-center justify-center gap-2"
            },
              React.createElement(Trash2, { className: "w-4 h-4" }), " Discard"
            ),
            React.createElement('button', {
              onClick: downloadRecording,
              className: "flex-1 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg shadow-blue-600/20 flex items-center justify-center gap-2"
            },
              React.createElement(Download, { className: "w-4 h-4" }), " Save"
            )
          )
        )
      ),

      // Error Overlay
      error && React.createElement('div', {
        className: "absolute inset-0 flex flex-col items-center justify-center bg-black/80 backdrop-blur-md z-30 p-6 text-center"
      },
        React.createElement(AlertCircle, { className: "w-12 h-12 text-red-500 mb-4" }),
        React.createElement('p', { className: "text-red-400 font-medium mb-4 max-w-md" }, error),
        React.createElement('div', { className: "flex gap-4" },
          React.createElement('button', {
            onClick: handleRetry,
            className: "px-6 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-white transition-colors"
          }, "Retry"),
          React.createElement('button', {
            onClick: onClose,
            className: "px-6 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-400 rounded-lg transition-colors"
          }, "Close")
        )
      ),

      // Cast Modal Overlay
      showCastModal && React.createElement('div', {
        className: "absolute inset-0 flex items-center justify-center bg-black/80 backdrop-blur-md z-40 p-6"
      },
        React.createElement('div', { className: "bg-[#1a1f35] border border-white/10 p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center" },
          React.createElement('div', { className: "w-16 h-16 bg-purple-500/20 rounded-full flex items-center justify-center mx-auto mb-4" },
            React.createElement(Cast, { className: "w-8 h-8 text-purple-400" })
          ),
          isCasting
            ? React.createElement(React.Fragment, null,
                React.createElement('h3', { className: "text-xl font-bold text-white mb-2" }, "In Trasmissione"),
                React.createElement('p', { className: "text-white/60 text-sm mb-2" }, "Stream del canale inviato a:"),

// --- Helpers ---

const fetchPlaylistContent = async (url) => {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000); 
    
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);
    
    if (res.ok) {
      return await res.text();
    }
    throw new Error("Direct fetch failed");
  } catch (e) {
    console.warn("Direct fetch failed, attempting CORS proxy...", e);
    try {
      const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
      const res = await fetch(proxyUrl);
      if (!res.ok) throw new Error("Proxy fetch failed");
      return await res.text();
    } catch (proxyError) {
      throw new Error("Failed to load playlist. The URL might be offline, geo-blocked, or the CORS proxy is unavailable.");
    }
  }
};

      try {

      } catch (e) {
        console.error("Failed to load playlists", e);
      }
    }

    // Inject default playlist if not already present
    const hasDefault = loadedPlaylists.some(p => p.id === DEFAULT_PLAYLIST.id);

      try {

    const playlistToLoad = loadedPlaylists.find(p => p.id === idToLoad) || loadedPlaylists[0];

    if (playlistToLoad) {
      setIsLoading(true);
      setActivePlaylistId(playlistToLoad.id);
      fetchPlaylistContent(playlistToLoad.url)
        .then(text => {

          if (parsed.channels.length > 0) {

                      onClick: (e) => handleDeletePlaylist(e, p.id),
                      className: "opacity-0 group-hover:opacity-100 hover:text-red-400"
                    }, React.createElement(Trash2, { className: "w-3.5 h-3.5" }))
                  )
                )),
                React.createElement('div', { className: "p-2 border-t border-white/10 bg-black/20" },
                  React.createElement('button', {
                    onClick: () => { setActivePlaylistId(null); setPlaylistData(null); setShowPlaylistSelector(false); },
                    className: "w-full py-2 text-blue-400 hover:bg-blue-600/20 rounded-lg text-xs font-bold flex justify-center gap-2"
                  },
                    React.createElement(Plus, { className: "w-3 h-3" }), " Add New"
                  )
                )
              )
            )
          ),

          React.createElement('div', { className: "relative" },
            React.createElement(Search, { className: "absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/40" }),
            React.createElement('input', {
              type: "text",
              placeholder: "Search...",

          ),

          React.createElement('div', { className: "pt-4 pb-2" },
            React.createElement('h3', { className: "text-xs font-bold text-white/40 uppercase tracking-widest" }, "Categories")
          )
        ),

        // Sidebar Scrollable Content
        React.createElement('div', { className: "flex-1 overflow-y-auto glass-scroll px-4 pb-10 min-h-0" },
          React.createElement('div', { className: "space-y-1" },
            visibleGroups.map(group => (
              React.createElement(GlassButton, {
                key: group,
                onClick: () => { setActiveGroup(group); setCurrentChannel(null); if(window.innerWidth < 768) setShowSidebar(false); },
                active: activeGroup === group,
                icon: group === 'Favorites' ? Heart : undefined,
                className: activeGroup === group ? '' : 'opacity-80'
              },
                React.createElement('div', { className: "flex justify-between w-full" },
                  React.createElement('span', null, group),
                  group === 'All' && React.createElement('span', { className: "text-xs bg-white/10 px-2 py-0.5 rounded-full text-white/60" }, playlistData?.channels.length || 0)

            ))
          )
        )
      ),

      // Main Content
      React.createElement('div', { className: "flex-1 h-full overflow-hidden flex flex-col relative pt-16 md:pt-0" },
        !playlistData
          ? React.createElement('div', { className: "flex-1 overflow-y-auto p-4 flex flex-col items-center justify-center w-full" },
              React.createElement(GlassCard, { className: "w-full max-w-xl p-8 md:p-10 flex flex-col items-center" },
                React.createElement('div', { className: "w-16 h-16 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-blue-500/30" },
                  React.createElement(Plus, { className: "w-8 h-8 text-white" })
                ),
                React.createElement('h2', { className: "text-3xl font-bold mb-2" }, "Add Playlist"),
                React.createElement('p', { className: "text-white/50 text-center mb-8" }, "Load M3U URL or upload file."),
                React.createElement('div', { className: "w-full space-y-4" },
                  React.createElement('input', {
                    type: "text",
                    placeholder: "Playlist Name",
                    className: "w-full px-4 py-3 bg-black/20 border border-white/10 rounded-xl focus:outline-none text-white",
                    value: playlistNameInput,
                    onChange: (e) => setPlaylistNameInput(e.target.value)
                  }),
                  React.createElement('div', { className: "relative" },
                    React.createElement(LinkIcon, { className: "absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-white/40" }),
                    React.createElement('input', {
                      type: "text",
                      placeholder: "https://...",
                      className: "w-full pl-12 pr-4 py-3 bg-black/20 border border-white/10 rounded-xl focus:outline-none text-white",
                      value: m3uInput,
                      onChange: (e) => setM3uInput(e.target.value)
                    })
                  ),
                  React.createElement('div', { className: "flex gap-3 pt-2" },
                    React.createElement('button', {
                      onClick: () => handleAddPlaylist('url', m3uInput, playlistNameInput),

                      className: "flex-1 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl flex items-center justify-center gap-2"
                    }, isLoading ? React.createElement(Loader2, { className: "animate-spin" }) : 'Load URL'),
                    React.createElement('label', { className: "flex-1 cursor-pointer" },
                      React.createElement('input', { type: "file", onChange: handleFileUpload, className: "hidden" }),
                      React.createElement('div', { className: "flex items-center justify-center gap-2 w-full h-full py-3 bg-white/10 border border-white/10 text-white font-bold rounded-xl hover:bg-white/20 cursor-pointer" },
                        isLoading ? React.createElement(Loader2, { className: "animate-spin" }) : React.createElement(React.Fragment, null, React.createElement(Upload, { size: 18 }), " File")
                      )
                    )
                  )
                )
              ),
              playlists.length > 0 && React.createElement('div', { className: "mt-8 w-full max-w-xl grid grid-cols-1 md:grid-cols-2 gap-4" },
                playlists.map(p => (
                  React.createElement(GlassButton, { key: p.id, onClick: () => selectPlaylist(p.id), icon: Tv, className: "bg-white/5" }, p.name)
                ))
              )
            )
          : React.createElement(React.Fragment, null,
              // Virtualized Channel Grid
              React.createElement('div', { className: "flex-1 overflow-hidden p-0" },
                React.createElement('div', { className: "h-full w-full px-6 md:px-8 py-6 flex flex-col" },
                  React.createElement('div', { className: "flex-shrink-0 mb-6" },
                    React.createElement('h2', { className: "text-2xl font-bold" }, activeGroup),
                    React.createElement('p', { className: "text-white/40 text-sm mt-1" }, `${filteredChannels.length} Channels`)
                  ),
                  React.createElement('div', { className: "flex-1 min-h-0" },
                    filteredChannels.length === 0
                      ? React.createElement('div', { className: "flex flex-col items-center justify-center h-full text-white/30" },
                          React.createElement(Tv, { className: "w-16 h-16 mb-4 opacity-20" }),
                          React.createElement('p', null, "No channels found")
                        )
                      : React.createElement(AutoSizer, null,
                          ({ height, width }) => {
                            const columnCount = getColumnCount(width);
                            const rowCount = Math.ceil(filteredChannels.length / columnCount);
                            const ROW_HEIGHT = 170;
                            
                            return React.createElement(List, {
                              height,
                              itemCount: rowCount,
                              itemSize: ROW_HEIGHT,
                              width,
                              className: "glass-scroll",
                              itemData: {
                                channels: filteredChannels,
                                columnCount,
                                favorites,
                                toggleFavorite,
                                onChannelClick: setCurrentChannel
                              }
                            }, ChannelRow);
                          }
                        )
                  )
                )
              ),
            
              // Overlay Player
              currentChannel && React.createElement('div', { className: "absolute inset-0 z-50 bg-black/90 backdrop-blur-md p-0 md:p-12 flex items-center justify-center" },
                React.createElement('div', { className: "w-full h-full md:h-auto md:max-w-6xl md:aspect-video shadow-2xl relative bg-black rounded-2xl overflow-hidden border border-white/10" },
                  React.createElement(VideoPlayer, { url: currentChannel.url, title: currentChannel.name, onClose: () => setCurrentChannel(null) })
                )
              )
            )
      )
    )
  );
};

// --- Mount ---
const rootElement = document.getElementById('root');
if (!rootElement) {
  throw new Error("Could not find root element to mount to");
}

const root = ReactDOM.createRoot(rootElement);
root.render(
  React.createElement(React.StrictMode, null,
    React.createElement(App, null)
  )
);
</script>
</body>
</html>
